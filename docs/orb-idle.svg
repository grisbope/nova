<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-label="Nova  orbe en reposo antes de activar">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0b1226"/>
      <stop offset="70%" stop-color="#05060a"/>
      <stop offset="100%" stop-color="#020308"/>
    </radialGradient>
    <radialGradient id="orb" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1f2a44"/>
      <stop offset="70%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.17
                0 0 0 0 0.23
                0 0 0 0 0.35
                0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>

  <g opacity="0.35">
    <circle cx="480" cy="230" r="170" fill="none" stroke="#2b3a5a" stroke-width="1" stroke-dasharray="4 10"/>
    <circle cx="480" cy="230" r="210" fill="none" stroke="#1f2a44" stroke-width="0.5" opacity="0.6"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="480" cy="230" r="110" fill="url(#orb)"/>
    <ellipse cx="430" cy="195" rx="34" ry="22" fill="#ffffff" opacity="0.08"/>
  </g>

  <text x="480" y="390" text-anchor="middle" fill="#e6e9f2" font-family="Segoe UI, system-ui, sans-serif" font-size="28" font-weight="600" letter-spacing="0.04em">Nova</text>
  <text x="480" y="428" text-anchor="middle" fill="#ffffff" opacity="0.72" font-family="Segoe UI, system-ui, sans-serif" font-size="18">Toca para activar</text>

  <g transform="translate(820 36)">
    <circle cx="0" cy="0" r="5" fill="#ffffff" opacity="0.28"/>
    <text x="14" y="5" fill="#ffffff" opacity="0.35" font-family="Segoe UI, system-ui, sans-serif" font-size="11" letter-spacing="0.22em">NEX</text>
  </g>
</svg>
